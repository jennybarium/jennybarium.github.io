<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>:: ATELIER // creative index</title>
<meta name="description" content="An artistic portfolio and creative diary, mapped as a live constellation.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- top bar -->
<header class="topbar">
  <button id="menuToggle" class="menu-toggle" aria-label="Open navigation" aria-expanded="false" aria-controls="navPanel">
    <span></span><span></span><span></span>
  </button>

  <div class="brand">
    <span class="brand-glyph">❧</span>
    <span class="brand-text">ATELIER</span>
  </div>

  <div class="player" id="player" aria-label="Audio player">
    <div class="player-controls">
      <button id="prevBtn" class="player-btn" aria-label="Previous track"></button>
      <button id="playBtn" class="player-btn" aria-label="Play">▶</button>
      <button id="nextBtn" class="player-btn" aria-label="Next track"></button>
      <button id="shuffleBtn" class="player-btn" aria-label="Toggle shuffle">🔀</button>
    </div>
    <div class="player-meta">
      <div class="player-title" id="trackTitle">loading…</div>
      <div class="player-bar" id="progressBar">
        <div class="player-bar-buffered" id="trackBuffered"></div>
        <div class="player-bar-fill" id="trackProgress"></div>
      </div>
      <div class="player-times">
        <span id="timeCurrent">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>
    <div class="player-extras">
      <button id="modeToggle" class="player-mode" aria-label="Switch source type">🎵</button>
      <select id="sourceSelect" class="player-source" aria-label="Audio source"></select>
      <input id="volume" class="player-volume" type="range" min="0" max="1" step="0.01" value="0.6" aria-label="Volume">
    </div>
    <audio id="audio" preload="auto"></audio>
  </div>
</header>

<!-- hidden slide-out nav -->
<nav id="navPanel" class="nav-panel" aria-hidden="true">
  <div class="nav-panel-head">
    <span>// index</span>
  </div>
  <ul id="navList" class="nav-list"></ul>
  <div class="nav-panel-foot">topics.json · live</div>
</nav>
<div id="navScrim" class="nav-scrim"></div>

<!-- graph -->
<main>
  <section id="graphSection" class="graph-section" aria-label="Topic network graph">
    <svg id="graph" role="img" aria-label="Interactive constellation of topics. Click a node to open it."></svg>
    <div class="graph-hint">click / tap a node · drag to reposition · scroll to zoom</div>
  </section>

  <!-- content panel (modal) -->
  <section id="contentPanel" class="content-panel" aria-hidden="true">
    <div class="content-panel-inner">
      <button id="closePanel" class="close-btn" aria-label="Close">✕</button>
      <div class="content-eyebrow" id="contentCategory">category</div>
      <h1 id="contentTitle">title</h1>
      <div id="contentBody" class="content-body"></div>
    </div>
  </section>
  <div id="contentScrim" class="content-scrim"></div>
</main>

<!-- diary / journal log stream -->
<aside id="journalLog" class="journal-log" aria-label="Journal log">
  <div class="journal-log-head">
    <span class="journal-dot"></span> sketchbook.journal
  </div>
  <ul id="journalList" class="journal-list"></ul>
</aside>

<footer class="sitefoot">
  <span>curator@atelier:~$</span>
</footer>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="script.js"></script>
</body>
</html>
